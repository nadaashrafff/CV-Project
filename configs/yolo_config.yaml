# YOLOv8 training configuration for E1 (baseline) and E11 (hybrid)
model: yolov8n.pt
data: /content/dataset_split_70_15_15/data.yaml

epochs: 100
imgsz: 416
batch: 16
patience: 20

optimizer: AdamW
lr0: 0.01
lrf: 0.01
momentum: 0.937
weight_decay: 0.0005

# Augmentation
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
degrees: 0.0
translate: 0.1
scale: 0.5
flipud: 0.0
fliplr: 0.5
mosaic: 1.0
mixup: 0.0

# Inference thresholds (locked)
conf: 0.25
iou: 0.45

project: /content/drive/MyDrive/CV/03_yolo_baseline
name: yolov8n_E1
